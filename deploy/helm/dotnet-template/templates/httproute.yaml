{{- if .Values.gateway.enabled }}
{{- $host := required "gateway.host is required" .Values.gateway.host -}}
{{- $httpsSectionName := required "gateway.httpsSectionName is required" .Values.gateway.httpsSectionName -}}
{{- if .Values.gateway.redirectHttpToHttps }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "dotnet-template.fullname" . }}-http-redirect
  labels:
    {{- include "dotnet-template.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.httpSectionName }}
  hostnames:
    - {{ $host }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "dotnet-template.fullname" . }}
  labels:
    {{- include "dotnet-template.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ $httpsSectionName }}
  hostnames:
    - {{ $host }}
  rules:
    - backendRefs:
        - name: {{ include "dotnet-template.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
