{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "dotnet-template.secretStoreName" . }}
  labels:
    {{- include "dotnet-template.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.externalSecrets.secretStoreSyncWave | quote }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.openbao.server | quote }}
      path: {{ .Values.externalSecrets.openbao.path | quote }}
      version: {{ .Values.externalSecrets.openbao.version | quote }}
      auth:
        kubernetes:
          mountPath: {{ .Values.externalSecrets.openbao.authMountPath | quote }}
          role: {{ .Values.externalSecrets.openbao.role | quote }}
          serviceAccountRef:
            name: {{ include "dotnet-template.externalSecretsServiceAccountName" . }}
---
{{- if .Values.externalSecrets.app.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.app.targetName }}
  labels:
    {{- include "dotnet-template.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.externalSecrets.syncWave | quote }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "dotnet-template.secretStoreName" . }}
    kind: SecretStore
  target:
    name: {{ .Values.externalSecrets.app.targetName }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.app.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.externalSecrets.app.remoteKey }}
        property: {{ .remoteProperty }}
    {{- end }}
{{- end }}
{{- if .Values.externalSecrets.registry.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.registry.targetName }}
  labels:
    {{- include "dotnet-template.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.externalSecrets.syncWave | quote }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "dotnet-template.secretStoreName" . }}
    kind: SecretStore
  target:
    name: {{ .Values.externalSecrets.registry.targetName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{ printf "{{ printf \"{\\\"auths\\\":{\\\"%%s\\\":{\\\"username\\\":\\\"%%s\\\",\\\"password\\\":\\\"%%s\\\",\\\"auth\\\":\\\"%%s\\\"}}}\" (.registry | replace \"https://\" \"\" | replace \"http://\" \"\" | trimSuffix \"/\") .username .password (printf \"%%s:%%s\" .username .password | b64enc) }}" | quote }}
  data:
    - secretKey: registry
      remoteRef:
        key: {{ .Values.externalSecrets.registry.remoteKey }}
        property: {{ .Values.externalSecrets.registry.serverProperty }}
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.registry.remoteKey }}
        property: {{ .Values.externalSecrets.registry.usernameProperty }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.registry.remoteKey }}
        property: {{ .Values.externalSecrets.registry.passwordProperty }}
{{- end }}
{{- end }}
