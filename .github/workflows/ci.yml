name: CI

on:
  pull_request:
  push:
    branches: [ main, development ]
    paths-ignore:
      - deploy/helm/dotnet-template/images-development.yaml
      - deploy/helm/dotnet-template/images-production.yaml

jobs:
  format:
    uses: PANiXiDA-Infrastructure/ci-cd/.github/workflows/dotnet-format.yml@main
    secrets:
      registry-user: ${{ secrets.REGISTRY_USER }}
      registry-token: ${{ secrets.REGISTRY_TOKEN }}

  tests:
    uses: PANiXiDA-Infrastructure/ci-cd/.github/workflows/dotnet-tests.yml@main
    secrets:
      registry-user: ${{ secrets.REGISTRY_USER }}
      registry-token: ${{ secrets.REGISTRY_TOKEN }}

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service values
        uses: actions/checkout@v6
        with:
          path: app

      - name: Checkout shared charts
        uses: actions/checkout@v6
        with:
          repository: PANiXiDA-Infrastructure/ci-cd
          ref: main
          path: ci-cd
          persist-credentials: false

      - name: Install Helm
        run: |
          set -euo pipefail
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
          chmod 700 get_helm.sh
          DESIRED_VERSION="v4.2.2" ./get_helm.sh

      - name: Lint Helm chart
        run: |
          set -euo pipefail
          helm lint ci-cd/charts/application \
            -f app/deploy/helm/dotnet-template/values.yaml \
            -f app/deploy/helm/dotnet-template/values-development.yaml \
            -f app/deploy/helm/dotnet-template/images-development.yaml
          helm lint ci-cd/charts/application \
            -f app/deploy/helm/dotnet-template/values.yaml \
            -f app/deploy/helm/dotnet-template/values-production.yaml \
            -f app/deploy/helm/dotnet-template/images-production.yaml

      - name: Render Helm chart
        run: |
          set -euo pipefail
          helm template dotnet-template-development ci-cd/charts/application \
            -f app/deploy/helm/dotnet-template/values.yaml \
            -f app/deploy/helm/dotnet-template/values-development.yaml \
            -f app/deploy/helm/dotnet-template/images-development.yaml \
            >/tmp/dotnet-template-development.yaml
          helm template dotnet-template-production ci-cd/charts/application \
            -f app/deploy/helm/dotnet-template/values.yaml \
            -f app/deploy/helm/dotnet-template/values-production.yaml \
            -f app/deploy/helm/dotnet-template/images-production.yaml \
            >/tmp/dotnet-template-production.yaml

  build-api:
    if: ${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'development') }}
    needs: [ format, tests, helm ]
    uses: PANiXiDA-Infrastructure/ci-cd/.github/workflows/docker-build.yml@main
    with:
      service-folder: ${{ vars.SERVICE_FOLDER }}
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository }}/${{ vars.SERVICE_NAME }}:${{ github.run_number }}
    secrets:
      registry-user: ${{ secrets.REGISTRY_USER }}
      registry-token: ${{ secrets.REGISTRY_TOKEN }}

  build-migrator:
    if: ${{ github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'development') }}
    needs: [ format, tests, helm ]
    uses: PANiXiDA-Infrastructure/ci-cd/.github/workflows/docker-build.yml@main
    with:
      service-folder: ${{ vars.MIGRATOR_FOLDER }}
      image: ${{ vars.REGISTRY_URL }}/${{ github.repository }}/${{ vars.MIGRATOR_NAME }}:${{ github.run_number }}
    secrets:
      registry-user: ${{ secrets.REGISTRY_USER }}
      registry-token: ${{ secrets.REGISTRY_TOKEN }}

  notify:
    if: ${{ always() && github.event_name != 'pull_request' && (github.ref_name == 'main' || github.ref_name == 'development') }}
    needs: [ build-api, build-migrator ]
    uses: PANiXiDA-Infrastructure/ci-cd/.github/workflows/notify-telegram.yml@main
    with:
      event-name: ${{ github.event_name }}
    secrets:
      telegram-bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      telegram-chat-id: ${{ vars.TELEGRAM_CHAT_ID }}
      github-token: ${{ secrets.REGISTRY_TOKEN }}
